<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULA DE BENCZES - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --dark-bg: #030303;
            --card-bg: rgba(7, 7, 10, 0.98);
            --light: #ffffff;
            --success: #00ff41;
            --glow-min: 0 0 6px rgba(255, 0, 0, 0.3);
        }

        body {
            margin: 0; padding: 10px; color: var(--light);
            font-family: 'Roboto Mono', monospace;
            display: flex; flex-direction: column; align-items: center;
            background: 
                linear-gradient(27deg, #111 5px, transparent 5px) 0 5px,
                linear-gradient(207deg, #111 5px, transparent 5px) 10px 0px,
                linear-gradient(27deg, #1a1a1a 5px, transparent 5px) 0px 10px,
                linear-gradient(207deg, #1a1a1a 5px, transparent 5px) 10px 5px,
                linear-gradient(90deg, #181818 10px, transparent 10px),
                linear-gradient(#151515 25%, #111 25%, #111 50%, transparent 50%, transparent 75%, #1d1d1d 75%, #1d1d1d);
            background-size: 20px 20px; background-color: #111;
        }

        .container { width: 100%; max-width: 1300px; position: relative; }

        header { 
            text-align: center; margin-bottom: 20px; padding: 15px;
            border-bottom: 6px solid var(--primary); background: rgba(0,0,0,0.95);
            transform: skew(-5deg);
        }
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 6vw, 4rem); 
            margin: 0; text-transform: uppercase; font-weight: 900; font-style: italic;
            color: var(--light); text-shadow: 2px 2px 0px var(--primary);
        }

        .timer-section { text-align: center; margin: 25px 0; }
        #timer {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 8vw, 3.8rem);
            color: var(--primary); font-weight: 900; letter-spacing: 1px;
            text-shadow: var(--glow-min);
        }
        .timer-sub-text {
            font-family: 'Orbitron', sans-serif; font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #fff; text-transform: uppercase; letter-spacing: 3px;
            margin-top: 5px; font-weight: 700; opacity: 0.9;
        }

        .admin-trigger { 
            position: fixed; top: 10px; right: 10px; 
            background: rgba(255, 0, 0, 0.2); border: 1px solid var(--primary); 
            color: var(--primary); font-size: 1.5rem; cursor: pointer; 
            z-index: 9999; padding: 5px 10px; border-radius: 5px;
        }
        .admin-active { background: var(--primary) !important; color: white !important; box-shadow: 0 0 15px var(--primary); }

        #adminPanel {
            display: none; background: #000; border: 2px solid var(--primary);
            padding: 20px; margin-bottom: 30px; text-align: center;
        }
        .admin-input { background: #111; border: 1px solid var(--primary); color: white; padding: 8px; margin: 5px; font-family: 'Orbitron'; width: 200px; }
        .admin-btn {
            background: var(--primary); color: white; border: none; padding: 10px 15px;
            cursor: pointer; font-weight: 900; margin: 5px; text-transform: uppercase;
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
        }

        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid #1a1a1a; position: relative; margin-bottom: 10px; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); }
        .card-header { 
            background: #0a0a0a; padding: 12px; font-size: 1rem; 
            text-transform: uppercase; font-weight: 900; color: var(--primary);
            font-family: 'Orbitron', sans-serif; font-style: italic; border-bottom: 1px solid #222;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 0.85rem; }
        .pts { text-align: right; font-weight: 900; color: var(--primary); font-size: 1.2rem; }
        .time { font-weight: 900; color: var(--success); text-align: right; }

        .last-race-header {
            grid-column: 1 / -1; text-align: center; font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 5vw, 2.2rem); color: var(--primary); margin: 40px 0 20px 0;
            text-transform: uppercase; font-weight: 900; font-style: italic; border-bottom: 2px solid var(--primary);
        }

        .track-section { grid-column: 1 / -1; width: 100%; height: 350px; border: 3px solid #1a1a1a; background: #000; position: relative; overflow: hidden; }
        .track-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); width: 350px; height: 100vw; max-height: 1200px; object-fit: contain; }

        .del-btn { background: #222; color: #ff0000; border: none; padding: 3px 6px; cursor: pointer; margin-left: 8px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-trigger" id="lockBtn" onclick="toggleLogin()">🔒</button>
    <header><h1>FORMULA DE BENCZES</h1></header>
    
    <div class="timer-section">
        <div id="timer">00D 00H 00M 00S</div>
        <div id="raceName" class="timer-sub-text">Kwiecień GP</div>
    </div>

    <div id="adminPanel">
        <div style="margin-bottom: 15px;">
            <input type="datetime-local" id="newDate" class="admin-input">
            <input type="text" id="newName" class="admin-input" placeholder="Race Name">
            <button class="admin-btn" onclick="updateRaceInfo()">💾 Save Race Info</button>
        </div>
        <button class="admin-btn" onclick="window.addDriver()">➕ Driver</button>
        <button class="admin-btn" onclick="window.addTeam()">➕ Team</button>
        <button class="admin-btn" style="background:#333" onclick="window.resetDatabase()">⚠️ Reset</button>
    </div>

    <div class="grid-layout">
        <div class="card"><div class="card-header">Drivers Standings</div><table><tbody id="driversBody"></tbody></table></div>
        <div class="card"><div class="card-header">Constructors Standings</div><table><tbody id="teamsBody"></tbody></table></div>
        <div class="last-race-header">LAST RACE REPORT</div>
        <div class="card"><div class="card-header">Best Lap Times</div><table><tbody id="bestBody"></tbody></table></div>
        <div class="card"><div class="card-header">Average Laps Time</div><table><tbody id="avgBody"></tbody></table></div>
        <div class="track-section"><img src="tor.png" class="track-image"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    const defaultDB = {
        drivers: [
            {name:"KZJ",pts:0},{name:"Hasztasz",pts:0},{name:"wichereky",pts:0},
            {name:"SuPerFlYJAcksOn",pts:0},{name:"max verstappen prowokacja",pts:0},
            {name:"verxzy27",pts:0},{name:"czambalimbe",pts:0},{name:"Dejvajd",pts:0},
            {name:"Don Czikit",pts:0},{name:"Gisonik",pts:0},{name:"0matй",pts:0},
            {name:"StekBzdur",pts:0},{name:"amekowek500",pts:0},{name:"TorettoTDR",pts:0},
            {name:"golab5700",pts:0},{name:"czasu",pts:0},{name:"Glory Cash",pts:0},
            {name:"A$_M4RO",pts:0},{name:"piotrkow",pts:0},{name:"zolniezyk",pts:0}
        ],
        teams: [
            {name:"Ferrari",pts:0},{name:"McLaren",pts:0},{name:"Mercedes",pts:0},
            {name:"Red Bull Racing",pts:0},{name:"Williams",pts:0},{name:"Aston Martin",pts:0},
            {name:"Haas",pts:0},{name:"Kick Sauber",pts:0},{name:"Alpine",pts:0},{name:"Racing Bulls",pts:0}
        ],
        times: [],
        raceDate: "2026-04-18T19:00",
        raceTitle: "Kwiecień GP"
    };

    let localDB = defaultDB;
    window.isLoggedIn = false;

    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').classList.toggle('admin-active', !!user);
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("E-mail:"); const pass = prompt("Hasło:");
            if(email && pass) try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Błąd!"); }
        } else { if(confirm("Wylogować?")) signOut(auth); }
    };

    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { localDB = data; render(); }
    });

    window.updateRaceInfo = () => {
        const d = document.getElementById('newDate').value;
        const n = document.getElementById('newName').value;
        if(d) localDB.raceDate = d;
        if(n) localDB.raceTitle = n;
        save();
    };

    window.addDriver = () => {
        const name = prompt("Imię:");
        if (name) {
            localDB.drivers.push({ name, pts: 0 });
            if(!localDB.times) localDB.times = [];
            localDB.times.push({ name, best: "0:00.000", avg: "0:00.000" });
            save();
        }
    };

    window.addTeam = () => {
        const name = prompt("Zespół:");
        if (name) { localDB.teams.push({ name, pts: 0 }); save(); }
    };

    window.updateData = (cat, idx, field, val) => {
        if (!window.isLoggedIn) return;
        localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val;
        save();
    };

    const save = () => set(dataRef, localDB);
    window.resetDatabase = () => { if(confirm("Reset bazy?")) set(dataRef, defaultDB); };
    window.removeEntry = (cat, i) => { if(confirm("Usunąć?")) { localDB[cat].splice(i, 1); save(); } };

    // FUNKCJA KONWERTUJĄCA CZAS NA LICZBĘ DO SORTOWANIA
    const timeToMs = (t) => {
        if (!t || t === "0:00.000") return 9999999;
        const clean = t.replace(/[:.]/g, '');
        return parseInt(clean) || 9999999;
    };

    function render() {
        const edit = window.isLoggedIn;
        const del = (cat, i) => edit ? `<button class="del-btn" onclick="window.removeEntry('${cat}',${i})">X</button>` : '';
        const row = (cat, i, field, val, cl="") => `<td class="${cl}" contenteditable="${edit}" onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        document.getElementById('raceName').innerText = localDB.raceTitle || "Kwiecień GP";

        // Sortowanie punktów (od największych)
        localDB.drivers.sort((a,b) => b.pts - a.pts);
        document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) => `<tr><td style="color:#444;">${i+1}${del('drivers',i)}</td>${row('drivers',i,'name',d.name)}${row('drivers',i,'pts',d.pts,'pts')}</tr>`).join('');
        
        localDB.teams.sort((a,b) => b.pts - a.pts);
        document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) => `<tr><td style="color:#444;">${i+1}${del('teams',i)}</td>${row('teams',i,'name',t.name)}${row('teams',i,'pts',t.pts,'pts')}</tr>`).join('');

        if(!localDB.times) localDB.times = [];
        
        // Sortowanie Best Laps (od najmniejszych)
        const sortedBest = [...localDB.times].sort((a,b) => timeToMs(a.best) - timeToMs(b.best));
        document.getElementById('bestBody').innerHTML = sortedBest.map((t, i) => {
            const originalIndex = localDB.times.findIndex(x => x.name === t.name);
            return `<tr><td>${t.name}${del('times',originalIndex)}</td>${row('times',originalIndex,'best',t.best,'time')}</tr>`;
        }).join('');

        // Sortowanie Average Laps (od najmniejszych)
        const sortedAvg = [...localDB.times].sort((a,b) => timeToMs(a.avg) - timeToMs(b.avg));
        document.getElementById('avgBody').innerHTML = sortedAvg.map((t, i) => {
            const originalIndex = localDB.times.findIndex(x => x.name === t.name);
            return `<tr><td>${t.name}</td>${row('times',originalIndex,'avg',t.avg,'time')}</tr>`;
        }).join('');
    }

    setInterval(() => {
        const target = localDB.raceDate || "2026-04-18T19:00";
        const diff = new Date(target).getTime() - new Date().getTime();
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        const pad = (n) => String(Math.max(0, n)).padStart(2, '0');
        document.getElementById("timer").innerText = `${d}D ${pad(h)}H ${pad(m)}M ${pad(s)}S`;
    }, 1000);
</script>
</body>
</html>
