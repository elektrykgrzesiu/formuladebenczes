<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDB LIVE - TRACKSIDE OPERATIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --dark-bg: #050505;
            --card-bg: rgba(10, 10, 10, 0.95);
            --light: #ffffff;
            --success: #00ff41;
            --glow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        body {
            margin: 0; padding: 20px;
            color: var(--light);
            font-family: 'Roboto Mono', monospace;
            display: flex; flex-direction: column; align-items: center;
            /* CARBON FIBER PATTERN */
            background: 
                linear-gradient(27deg, #151515 5px, transparent 5px) 0 5px,
                linear-gradient(207deg, #151515 5px, transparent 5px) 10px 0px,
                linear-gradient(27deg, #222 5px, transparent 5px) 0px 10px,
                linear-gradient(207deg, #222 5px, transparent 5px) 10px 5px,
                linear-gradient(90deg, #1b1b1b 10px, transparent 10px),
                linear-gradient(#1d1d1d 25%, #1a1a1a 25%, #1a1a1a 50%, transparent 50%, transparent 75%, #242424 75%, #242424);
            background-size: 20px 20px;
            background-color: #131313;
        }

        .container { width: 100%; max-width: 1300px; position: relative; }

        header { 
            text-align: center; margin-bottom: 20px; padding: 20px;
            border-bottom: 6px solid var(--primary); background: rgba(0,0,0,0.9);
            box-shadow: var(--glow); transform: skew(-5deg);
        }
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 7vw, 4rem); 
            margin: 0; text-transform: uppercase; font-weight: 900; font-style: italic;
            letter-spacing: -2px; color: var(--light); text-shadow: 3px 3px 0px var(--primary);
        }

        #timer {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 5vw, 3.2rem);
            color: var(--primary); text-align: center; margin: 25px 0;
            text-shadow: 0 0 15px var(--primary); font-weight: 900;
        }

        #adminPanel {
            display: none; background: #000; border: 2px solid var(--primary);
            padding: 20px; margin-bottom: 30px; text-align: center; box-shadow: var(--glow);
        }
        .admin-btn {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            cursor: pointer; font-weight: 900; margin: 5px; text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        .grid-layout { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 100%;
        }

        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg); border-top: 4px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 10px;
            border: 1px solid #222;
        }

        .card-header { 
            background: #111; padding: 12px; font-size: 1.1rem; 
            text-transform: uppercase; font-weight: 900; color: var(--primary);
            font-family: 'Orbitron', sans-serif; border-bottom: 1px solid #333;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px; border-bottom: 1px solid #1a1a1a; }
        
        .pts { text-align: right; font-weight: 900; color: var(--primary); font-size: 1.4rem; }
        .time { font-weight: 900; color: var(--success); text-align: right; }

        /* NOWY FIX DLA ZDJĘCIA: WYMUSZONE POZIOME WYPEŁNIENIE */
        .track-section {
            grid-column: 1 / -1; 
            width: 100%; 
            height: 450px; /* Stała wysokość kontenera */
            margin-top: 30px;
            border: 4px solid #1a1a1a;
            background: #000;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glow);
        }
        .track-image { 
            position: absolute;
            top: 50%;
            left: 50%;
            /* Obrót i dynamiczne dopasowanie skali */
            transform: translate(-50%, -50%) rotate(90deg);
            /* To sprawia, że wysokość zdjęcia staje się szerokością kontenera */
            width: 450px; 
            height: 100vw; 
            max-height: 1300px;
            object-fit: contain;
            filter: contrast(115%);
        }

        .admin-trigger {
            position: absolute; top: -10px; right: 0; background: none; border: none;
            color: #111; font-size: 1.5rem; cursor: pointer;
        }
        .admin-active { color: var(--primary) !important; text-shadow: var(--glow); }
        .del-btn { background: #333; color: #f00; border: none; padding: 4px 8px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-trigger" id="lockBtn" onclick="toggleLogin()">🔒</button>
    <header><h1>FORMULA DE BENCZES</h1></header>
    <div id="timer">00D 00H 00M 00S</div>

    <div id="adminPanel">
        <h2 style="margin:0 0 15px 0; color:white; font-family: 'Orbitron';">RACE CONTROL</h2>
        <button class="admin-btn" onclick="window.addDriver()">➕ Add Driver</button>
        <button class="admin-btn" onclick="window.addTeam()">➕ Add Team</button>
        <button class="admin-btn" style="background:#333" onclick="window.resetDatabase()">⚠️ Full Reset</button>
    </div>

    <div class="grid-layout">
        <div class="card"><div class="card-header">Drivers Standings</div><table><tbody id="driversBody"></tbody></table></div>
        <div class="card"><div class="card-header">Constructors Standings</div><table><tbody id="teamsBody"></tbody></table></div>
        <div class="card"><div class="card-header">Best Lap Standings</div><table><tbody id="bestBody"></tbody></table></div>
        <div class="card"><div class="card-header">Average Lap Standings</div><table><tbody id="avgBody"></tbody></table></div>
        
        <div class="track-section">
            <img src="tor.png" class="track-image">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    const defaultDB = {
        drivers: [{name:"Dejv",pts:0},{name:"Piotrkow",pts:0},{name:"Wiechson",pts:0},{name:"Kappa Żul",pts:0},{name:"Krystiano13",pts:0},{name:"Seba",pts:0}],
        teams: [{name:"MV33 born2win",pts:0},{name:"Żule Racing",pts:0},{name:"The UnderTakers",pts:0}],
        times: [{name:"Dejv",best:"0:00.000",avg:"0:00.000"},{name:"Piotrkow",best:"0:00.000",avg:"0:00.000"},{name:"Wiechson",best:"0:00.000",avg:"0:00.000"},{name:"Kappa Żul",best:"0:00.000",avg:"0:00.000"},{name:"Krystiano13",best:"0:00.000",avg:"0:00.000"},{name:"Seba",best:"0:00.000",avg:"0:00.000"}]
    };

    let localDB = defaultDB;
    window.isLoggedIn = false;

    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').classList.toggle('admin-active', !!user);
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("E-mail:");
            const pass = prompt("Hasło:");
            if(email && pass) {
                try { await signInWithEmailAndPassword(auth, email, pass); }
                catch (e) { alert("Błąd!"); }
            }
        } else { if(confirm("Wylogować?")) signOut(auth); }
    };

    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { localDB = data; render(); }
        else { set(dataRef, defaultDB); }
    });

    window.addDriver = () => {
        const name = prompt("Imię:");
        if (name) {
            localDB.drivers.push({ name: name, pts: 0 });
            localDB.times.push({ name: name, best: "0:00.000", avg: "0:00.000" });
            save();
        }
    };

    window.addTeam = () => {
        const tName = prompt("Zespół:");
        if (tName) {
            localDB.teams.push({ name: tName, pts: 0 });
            save();
        }
    };

    window.resetDatabase = () => { if(confirm("Reset?")) set(dataRef, defaultDB); }
    window.removeEntry = (cat, index) => { if(confirm("Usunąć?")) { localDB[cat].splice(index, 1); save(); } };
    const save = () => set(dataRef, localDB);
    window.updateData = (cat, idx, field, val) => { if (!window.isLoggedIn) return; localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val; save(); };

    function render() {
        const edit = window.isLoggedIn;
        const del = (cat, i) => edit ? `<button class="del-btn" onclick="window.removeEntry('${cat}',${i})">X</button>` : '';
        const row = (cat, i, field, val, cl="") => `<td class="${edit?'editable':''} ${cl}" contenteditable="${edit}" onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        localDB.drivers.sort((a,b) => b.pts - a.pts);
        document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) => `<tr><td>${i+1}${del('drivers',i)}</td>${row('drivers',i,'name',d.name)}${row('drivers',i,'pts',d.pts,'pts')}</tr>`).join('');
        localDB.teams.sort((a,b) => b.pts - a.pts);
        document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) => `<tr><td>${i+1}${del('teams',i)}</td>${row('teams',i,'name',t.name)}${row('teams',i,'pts',t.pts,'pts')}</tr>`).join('');
        document.getElementById('bestBody').innerHTML = localDB.times.map((t, i) => `<tr><td>${t.name}${del('times',i)}</td>${row('times',i,'best',t.best,'time')}</tr>`).join('');
        document.getElementById('avgBody').innerHTML = localDB.times.map((t, i) => `<tr><td>${t.name}</td>${row('times',i,'avg',t.avg,'time')}</tr>`).join('');
    }

    setInterval(() => {
        const diff = new Date("2026-04-18T14:00:00").getTime() - new Date().getTime();
        const d = Math.floor(diff / (1000 * 60 * 60 * 24)), h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)), m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)), s = Math.floor((diff % (1000 * 60)) / 1000);
        const pad = (n) => String(Math.max(0, n)).padStart(2, '0');
        document.getElementById("timer").innerText = `${d}D ${pad(h)}H ${pad(m)}M ${pad(s)}S`;
    }, 1000);
</script>
</body>
</html>
