<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDB LIVE - TRACKSIDE OPERATIONS</title>
    <style>
        /* Agresywna czcionka technologiczna */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --primary: #ff0000; /* Czysta, agresywna czerwień */
            --dark-bg: #050505; /* Prawie czarne tło */
            --card-bg: rgba(10, 10, 15, 0.9); /* Półprzezroczyste karty */
            --light: #f1f1f1;
            --accent: #1a1a25; /* Ciemny akcent */
            --success: #00ff41; /* Neonowa zieleń matrixa */
            --glow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background-color: var(--dark-bg);
            /* Tekstura Carbon Fiber w tle */
            background-image: 
                linear-gradient(45deg, #111 25%, transparent 25%), 
                linear-gradient(-45deg, #111 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #111 75%),
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px 5px, 5px 0;
            color: var(--light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1400px; position: relative; }

        header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary); box-shadow: var(--glow); }
        header h1 { font-size: clamp(1.8rem, 6vw, 3.5rem); margin: 10px 0; text-transform: uppercase; font-weight: 700; letter-spacing: -2px; color: var(--light); text-shadow: var(--glow); }

        #timer {
            font-size: clamp(1.8rem, 5.5vw, 4rem); font-weight: 700; color: var(--primary);
            text-align: center; margin: 30px 0; font-family: 'Roboto Mono', monospace;
            text-shadow: 0 0 25px var(--primary);
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; border: 1px solid #222;
        }

        /* Panel Admina */
        #adminPanel {
            display: none; background: rgba(225, 0, 0, 0.15);
            border: 2px solid var(--primary); padding: 15px;
            margin-bottom: 25px; border-radius: 4px; text-align: center;
            box-shadow: var(--glow);
        }
        .admin-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 24px; border-radius: 2px; cursor: pointer;
            font-weight: 700; margin: 5px; text-transform: uppercase; font-family: 'Roboto Mono', monospace;
            transition: 0.2s;
        }
        .admin-btn:hover { box-shadow: var(--glow); }
        .del-btn { background: #444; font-size: 0.7rem; padding: 3px 6px; margin-left: 10px; cursor: pointer; color: #fff; border: none; border-radius: 2px; font-family: sans-serif; }

        /* Układ tabel w dwóch kolumnach */
        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Zawsze 2 kolumny na dużych ekranach */
            gap: 25px; margin-bottom: 30px; 
        }

        @media (max-width: 800px) {
            .grid-layout { grid-template-columns: 1fr; } /* Jedna kolumna na telefonach */
        }

        .card {
            background: var(--card-bg); border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); box-shadow: var(--glow); }

        .card-header { 
            background: #111; padding: 12px 15px; font-size: 1rem; 
            text-transform: uppercase; font-weight: 700; color: var(--primary);
            border-bottom: 2px solid #222;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .time { font-family: 'Roboto Mono', monospace; color: var(--success); font-weight: 700; text-align: right; text-shadow: 0 0 10px var(--success); }
        .pts { text-align: right; font-weight: 700; color: var(--primary); font-size: 1.1rem; text-shadow: var(--glow); }

        .editable[contenteditable="true"] { background: rgba(255, 255, 255, 0.08); outline: 1px dashed var(--primary); color: white; }

        /* Agresywne zdjęcie toru na pełną szerokość pod tabelami */
        .track-container { 
            width: 100%; margin-top: 10px; 
            border: 2px solid #222; border-radius: 2px;
            overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        .track-container:hover { border-color: var(--primary); box-shadow: var(--glow); }
        .track-image { width: 100%; height: auto; display: block; filter: grayscale(30%) contrast(110%); }

        .admin-trigger {
            position: absolute; top: 0; right: 0;
            background: none; color: #222; border: 1px solid #222;
            border-radius: 50%; width: 44px; height: 44px; cursor: pointer; transition: 0.3s;
        }
        .admin-active { color: var(--primary) !important; border-color: var(--primary); box-shadow: var(--glow); }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-trigger" id="lockBtn" onclick="toggleLogin()">🔒</button>
    <header><h1>FORMUŁA DE BENCZES</h1></header>
    <div id="timer">00d 00h 00m 00s</div>

    <div id="adminPanel">
        <h3 style="margin-top:0; color:white;">DATA ACQUISITION CENTER</h3>
        <button class="admin-btn" onclick="window.addDriver()">➕ Add Driver</button>
        <button class="admin-btn" onclick="window.addTeam()">➕ Add Team</button>
        <button class="admin-btn" style="background:#333" onclick="window.resetDatabase()">⚠️ Full Reset</button>
    </div>

    <div class="grid-layout">
        <div class="card"><div class="card-header">Driver Standings</div><table><tbody id="driversBody"></tbody></table></div>
        <div class="card"><div class="card-header">Constructor Standings</div><table><tbody id="teamsBody"></tbody></table></div>
        <div class="card"><div class="card-header">Best Lap Times</div><table><tbody id="bestBody"></tbody></table></div>
        <div class="card"><div class="card-header">Average Lap Times</div><table><tbody id="avgBody"></tbody></table></div>
    </div>

    <div class="track-container"><img src="tor.png" class="track-image" alt="Track Map"></div>
</div>

<script type="module">
    // --- (Cała sekcja JavaScript pozostaje DOKŁADNIE taka sama jak w poprzedniej wersji v4.0) ---
    // --- Wklej tutaj cały blok <script type="module"> z poprzedniej odpowiedzi ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    const defaultDB = {
        drivers: [{name:"Dejv",pts:0},{name:"Piotrkow",pts:0},{name:"Wiechson",pts:0},{name:"Kappa Żul",pts:0},{name:"Krystiano13",pts:0},{name:"Seba",pts:0}],
        teams: [{name:"MV33 born2win",pts:0},{name:"Żule Racing",pts:0},{name:"The UnderTakers",pts:0}],
        times: [{name:"Dejv",best:"0:00.000",avg:"0:00.000"},{name:"Piotrkow",best:"0:00.000",avg:"0:00.000"},{name:"Wiechson",best:"0:00.000",avg:"0:00.000"},{name:"Kappa Żul",best:"0:00.000",avg:"0:00.000"},{name:"Krystiano13",best:"0:00.000",avg:"0:00.000"},{name:"Seba",best:"0:00.000",avg:"0:00.000"}]
    };

    let localDB = defaultDB;
    window.isLoggedIn = false;

    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').classList.toggle('admin-active', !!user);
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("E-mail:");
            const pass = prompt("Hasło:");
            if(email && pass) {
                try { await signInWithEmailAndPassword(auth, email, pass); }
                catch (e) { alert("Błąd logowania!"); }
            }
        } else { if(confirm("Wylogować?")) signOut(auth); }
    };

    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { localDB = data; render(); }
        else { set(dataRef, defaultDB); }
    });

    window.addDriver = () => {
        const name = prompt("Imię kierowcy:");
        if (name) {
            localDB.drivers.push({ name: name, pts: 0 });
            localDB.times.push({ name: name, best: "0:00.000", avg: "0:00.000" });
            save();
        }
    };

    window.addTeam = () => {
        const tName = prompt("Nazwa zespołu:");
        if (tName) {
            localDB.teams.push({ name: tName, pts: 0 });
            save();
        }
    };

    window.resetDatabase = () => { if(confirm("Reset do zera?")) set(dataRef, defaultDB); }
    window.removeEntry = (cat, index) => { if(confirm("Usunąć?")) { localDB[cat].splice(index, 1); save(); } };
    const save = () => set(dataRef, localDB);
    window.updateData = (cat, idx, field, val) => { if (!window.isLoggedIn) return; localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val; save(); };

    function render() {
        const edit = window.isLoggedIn;
        const del = (cat, i) => edit ? `<button class="del-btn" onclick="window.removeEntry('${cat}',${i})">X</button>` : '';
        const row = (cat, i, field, val, cl="") => `<td class="${edit?'editable':''} ${cl}" contenteditable="${edit}" onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        localDB.drivers.sort((a,b) => b.pts - a.pts);
        document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) => `<tr><td>${i+1}${del('drivers',i)}</td>${row('drivers',i,'name',d.name)}${row('drivers',i,'pts',d.pts,'pts')}</tr>`).join('');
        localDB.teams.sort((a,b) => b.pts - a.pts);
        document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) => `<tr><td>${i+1}${del('teams',i)}</td>${row('teams',i,'name',t.name)}${row('teams',i,'pts',t.pts,'pts')}</tr>`).join('');
        document.getElementById('bestBody').innerHTML = localDB.times.map((t, i) => `<tr><td>${t.name}${del('times',i)}</td>${row('times',i,'best',t.best,'time')}</tr>`).join('');
        document.getElementById('avgBody').innerHTML = localDB.times.map((t, i) => `<tr><td>${t.name}</td>${row('times',i,'avg',t.avg,'time')}</tr>`).join('');
    }

    setInterval(() => {
        const diff = new Date("2026-04-18T14:00:00").getTime() - new Date().getTime();
        const d = Math.floor(diff / (1000 * 60 * 60 * 24)), h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)), m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)), s = Math.floor((diff % (1000 * 60)) / 1000);
        const pad = (n) => String(Math.max(0, n)).padStart(2, '0');
        document.getElementById("timer").innerText = `${d}d ${pad(h)}h ${pad(m)}m ${pad(s)}s`;
    }, 1000);
</script>
</body>
</html>
