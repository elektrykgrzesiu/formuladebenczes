<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDB LIVE - FORMULA DE BENCZES</title>
    <style>
        :root {
            --primary: #e10600;
            --dark-bg: #030305;
            --card-bg: #0a0a0f;
            --light: #f1f1f1;
            --accent: #2c2c36;
            --success: #00ff41;
        }

        body {
            font-family: 'Segoe UI Bold', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a25 0%, #030305 100%);
            color: var(--light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; position: relative; }

        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); }
        header h1 { font-size: clamp(1.5rem, 5vw, 3rem); margin: 10px 0; text-transform: uppercase; letter-spacing: -1px; }

        #timer {
            font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 900; color: var(--primary);
            text-align: center; margin-bottom: 30px; font-family: monospace;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.5);
        }

        /* Panel Admina */
        #adminPanel {
            display: none; background: rgba(225, 6, 0, 0.1);
            border: 1px solid var(--primary); padding: 15px;
            margin-bottom: 20px; border-radius: 8px; text-align: center;
        }
        .admin-btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-weight: bold; margin: 5px; text-transform: uppercase;
        }
        .del-btn { background: #555; font-size: 0.7rem; padding: 2px 5px; margin-left: 10px; cursor: pointer; color: #fff; border: none; border-radius: 3px; }

        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-bottom: 25px; 
        }

        .card {
            background: var(--card-bg); border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden;
            border-top: 3px solid var(--primary);
        }

        .card-header { background: var(--accent); padding: 10px 15px; font-size: 0.9rem; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        .time { font-family: monospace; color: var(--success); font-weight: bold; text-align: right; }
        .pts { text-align: right; font-weight: bold; color: var(--primary); }

        .editable[contenteditable="true"] { background: rgba(255, 255, 255, 0.1); outline: 1px dashed var(--primary); }

        .track-container { width: 100%; margin-top: 30px; border: 1px solid var(--accent); }
        .track-image { width: 100%; display: block; }

        .admin-trigger {
            position: absolute; top: 0; right: 0;
            background: none; color: #333; border: 1px solid #333;
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
        }
        .admin-active { color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-trigger" id="lockBtn" onclick="toggleLogin()">🔒</button>
    <header><h1>FORMUŁA DE BENCZES</h1></header>
    <div id="timer">00d 00h 00m 00s</div>

    <div id="adminPanel">
        <h3 style="margin-top:0">Panel Zarządzania</h3>
        <button class="admin-btn" onclick="window.addDriver()">➕ Dodaj Kierowcę</button>
        <button class="admin-btn" onclick="window.addTeam()">➕ Dodaj Zespół</button>
        <button class="admin-btn" style="background:#555" onclick="window.resetDatabase()">⚠️ Resetuj do Domyślnych</button>
    </div>

    <div class="grid-layout">
        <div class="card"><div class="card-header">Klasyfikacja Kierowców</div><table><tbody id="driversBody"></tbody></table></div>
        <div class="card"><div class="card-header">Klasyfikacja Konstruktorów</div><table><tbody id="teamsBody"></tbody></table></div>
    </div>

    <div class="grid-layout">
        <div class="card"><div class="card-header">Najlepsze Okrążenia</div><table><tbody id="bestBody"></tbody></table></div>
        <div class="card"><div class="card-header">Średnie Czasy</div><table><tbody id="avgBody"></tbody></table></div>
    </div>

    <div class="track-container"><img src="tor.png" class="track-image"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    // LISTA STARTOWA TWOICH KIEROWCÓW I ZESPOŁÓW
    const defaultDB = {
        drivers: [
            { name: "Dejv", pts: 0 }, { name: "Piotrkow", pts: 0 },
            { name: "Wiechson", pts: 0 }, { name: "Kappa Żul", pts: 0 },
            { name: "Krystiano13", pts: 0 }, { name: "Seba", pts: 0 }
        ],
        teams: [
            { name: "MV33 born2win", pts: 0 },
            { name: "Żule Racing", pts: 0 },
            { name: "The UnderTakers", pts: 0 }
        ],
        times: [
            { name: "Dejv", best: "0:00.000", avg: "0:00.000" },
            { name: "Piotrkow", best: "0:00.000", avg: "0:00.000" },
            { name: "Wiechson", best: "0:00.000", avg: "0:00.000" },
            { name: "Kappa Żul", best: "0:00.000", avg: "0:00.000" },
            { name: "Krystiano13", best: "0:00.000", avg: "0:00.000" },
            { name: "Seba", best: "0:00.000", avg: "0:00.000" }
        ]
    };

    let localDB = defaultDB;
    window.isLoggedIn = false;

    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').classList.toggle('admin-active', !!user);
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("E-mail:");
            const pass = prompt("Hasło:");
            if(email && pass) {
                try { await signInWithEmailAndPassword(auth, email, pass); }
                catch (e) { alert("Błąd logowania!"); }
            }
        } else { if(confirm("Wylogować?")) signOut(auth); }
    };

    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { localDB = data; render(); }
        else { set(dataRef, defaultDB); } // Jeśli baza pusta, wgraj domyślnych
    });

    window.addDriver = () => {
        const name = prompt("Imię kierowcy:");
        if (name) {
            localDB.drivers.push({ name: name, pts: 0 });
            localDB.times.push({ name: name, best: "0:00.000", avg: "0:00.000" });
            save();
        }
    };

    window.addTeam = () => {
        const tName = prompt("Nazwa zespołu:");
        if (tName) {
            localDB.teams.push({ name: tName, pts: 0 });
            save();
        }
    };

    window.resetDatabase = () => {
        if(confirm("Czy na pewno chcesz zresetować wszystkich kierowców i punkty do zera?")) {
            set(dataRef, defaultDB);
        }
    }

    window.removeEntry = (cat, index) => {
        if(confirm("Usunąć ten wiersz?")) {
            localDB[cat].splice(index, 1);
            save();
        }
    };

    const save = () => set(dataRef, localDB);

    window.updateData = (cat, idx, field, val) => {
        if (!window.isLoggedIn) return;
        localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val;
        save();
    };

    function render() {
        const edit = window.isLoggedIn;
        const del = (cat, i) => edit ? `<button class="del-btn" onclick="window.removeEntry('${cat}',${i})">X</button>` : '';
        const row = (cat, i, field, val, cl="") => `<td class="${edit?'editable':''} ${cl}" contenteditable="${edit}" onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        localDB.drivers.sort((a,b) => b.pts - a.pts);
        document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) => 
            `<tr><td>${i+1}${del('drivers',i)}</td>${row('drivers',i,'name',d.name)}${row('drivers',i,'pts',d.pts,'pts')}</tr>`).join('');

        localDB.teams.sort((a,b) => b.pts - a.pts);
        document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) => 
            `<tr><td>${i+1}${del('teams',i)}</td>${row('teams',i,'name',t.name)}${row('teams',i,'pts',t.pts,'pts')}</tr>`).join('');

        document.getElementById('bestBody').innerHTML = localDB.times.map((t, i) => 
            `<tr><td>${t.name}${del('times',i)}</td>${row('times',i,'best',t.best,'time')}</tr>`).join('');
        document.getElementById('avgBody').innerHTML = localDB.times.map((t, i) => 
            `<tr><td>${t.name}</td>${row('times',i,'avg',t.avg,'time')}</tr>`).join('');
    }

    // Timer (Dni, Godziny, Minuty, Sekundy)
    setInterval(() => {
        const diff = new Date("2026-04-18T14:00:00").getTime() - new Date().getTime();
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        const pad = (n) => String(Math.max(0, n)).padStart(2, '0');
        document.getElementById("timer").innerText = `${d}d ${pad(h)}h ${pad(m)}m ${pad(s)}s`;
    }, 1000);
</script>
</body>
</html>
