<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDB LIVE - FORMULA DE BENCZES</title>
    <style>
        :root {
            --primary: #e10600;
            --dark-bg: #030305;
            --card-bg: #0a0a0f;
            --light: #f1f1f1;
            --accent: #2c2c36;
            --success: #00ff41;
        }

        body {
            font-family: 'Segoe UI Bold', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a25 0%, #030305 100%);
            color: var(--light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; position: relative; }

        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); }
        header h1 { font-size: clamp(1.5rem, 5vw, 3rem); margin: 10px 0; text-transform: uppercase; }

        #timer {
            font-size: clamp(2rem, 7vw, 4.5rem); font-weight: 900; color: var(--primary);
            text-align: center; margin-bottom: 30px; font-family: monospace;
            text-shadow: 0 0 20px var(--primary);
        }

        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        .card {
            background: var(--card-bg); border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden;
            border-top: 3px solid var(--primary);
        }

        .card-header {
            background: var(--accent); padding: 10px 15px;
            font-size: 0.9rem; text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        .time { font-family: monospace; color: var(--success); font-weight: bold; text-align: right; }
        .pts { text-align: right; font-weight: bold; color: var(--primary); }

        .editable[contenteditable="true"] { 
            background: rgba(225, 6, 0, 0.15); 
            outline: 1px dashed var(--primary); 
        }

        .track-container {
            width: 100%; margin-top: 30px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .track-image { width: 100%; display: block; }

        .admin-trigger {
            position: absolute; top: 0; right: 0;
            background: none; color: #333; border: 1px solid #333;
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
            transition: 0.3s;
        }
        .admin-active { 
            color: var(--primary) !important; 
            border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary); 
        }
    </style>
</head>
<body>

<div class="container">
    <button class="admin-trigger" id="lockBtn" onclick="toggleLogin()">🔒</button>
    <header><h1>FORMUŁA DE BENCZES</h1></header>
    <div id="timer">00:00:00</div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-header">Klasyfikacja Kierowców</div>
            <table><tbody id="driversBody"></tbody></table>
        </div>
        <div class="card">
            <div class="card-header">Klasyfikacja Konstruktorów</div>
            <table><tbody id="teamsBody"></tbody></table>
        </div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-header">Najlepsze Okrążenia</div>
            <table><tbody id="bestBody"></tbody></table>
        </div>
        <div class="card">
            <div class="card-header">Średnie Czasy</div>
            <table><tbody id="avgBody"></tbody></table>
        </div>
    </div>

    <div class="track-container">
        <img src="tor.png" class="track-image" alt="Mapa Toru">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    // Twoja konfiguracja z Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    let localDB = {
        drivers: [{name: "Kierowca 1", pts: 0}],
        teams: [{name: "Zespół 1", pts: 0}],
        times: [{name: "Kierowca 1", best: "0:00.000", avg: "0:00.000"}]
    };

    window.isLoggedIn = false;

    // Obsługa logowania
    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').classList.toggle('admin-active', !!user);
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("Podaj e-mail admina:");
            const pass = prompt("Podaj hasło:");
            if (email && pass) {
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch (e) {
                    alert("Błąd logowania! Sprawdź dane w Authentication.");
                }
            }
        } else {
            if (confirm("Czy chcesz się wylogować?")) signOut(auth);
        }
    };

    // Synchronizacja LIVE
    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            localDB = data;
            render();
        }
    });

    function render() {
        const edit = window.isLoggedIn;
        const row = (cat, i, field, val, cl="") => `
            <td class="${edit?'editable':''} ${cl}" 
                contenteditable="${edit}" 
                onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        // Sortowanie i wyświetlanie
        localDB.drivers.sort((a,b) => b.pts - a.pts);
        document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) => 
            `<tr><td>${i+1}</td>${row('drivers',i,'name',d.name)}${row('drivers',i,'pts',d.pts,'pts')}</tr>`).join('');

        localDB.teams.sort((a,b) => b.pts - a.pts);
        document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) => 
            `<tr><td>${i+1}</td>${row('teams',i,'name',t.name)}${row('teams',i,'pts',t.pts,'pts')}</tr>`).join('');

        document.getElementById('bestBody').innerHTML = localDB.times.map((t, i) => 
            `<tr><td>${t.name}</td>${row('times',i,'best',t.best,'time')}</tr>`).join('');

        document.getElementById('avgBody').innerHTML = localDB.times.map((t, i) => 
            `<tr><td>${t.name}</td>${row('times',i,'avg',t.avg,'time')}</tr>`).join('');
    }

    window.updateData = (cat, idx, field, val) => {
        if (!window.isLoggedIn) return;
        localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val;
        set(dataRef, localDB);
    };

    // Timer do wyścigu
    setInterval(() => {
        const target = new Date("April 18, 2026 14:00:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;
        
        if (diff < 0) {
            document.getElementById("timer").innerText = "WYŚCIG TRWA!";
            return;
        }

        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        
        document.getElementById("timer").innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);

</script>
</body>
</html>
