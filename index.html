
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULA DE BENCZES - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e8000a;
            --red-hot: #ff2030;
            --red-glow: rgba(232, 0, 10, 0.5);
            --bg: #070709;
            --bg2: #0d0d10;
            --panel: #111116;
            --panel2: #16161c;
            --border: rgba(255,255,255,0.07);
            --border-red: rgba(232,0,10,0.5);
            --text: #f0f0f0;
            --text-dim: rgba(240,240,240,0.4);
            --green: #00e676;
            --gold: #ffd600;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.88rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === SCANLINE OVERLAY === */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.12) 2px,
                rgba(0,0,0,0.12) 4px
            );
        }

        /* === NOISE TEXTURE === */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .page-wrap { position: relative; z-index: 1; padding: 20px 16px 60px; }

        /* ===================== HEADER ===================== */
        header {
            position: relative;
            margin-bottom: 0;
            overflow: hidden;
        }

        .header-stripe {
            height: 4px;
            background: linear-gradient(90deg, transparent 0%, var(--red) 20%, var(--red-hot) 50%, var(--red) 80%, transparent 100%);
            animation: pulse-stripe 2s ease-in-out infinite alternate;
        }
        @keyframes pulse-stripe { from { opacity: 0.7; } to { opacity: 1; } }

        .header-inner {
            background: linear-gradient(180deg, #12121a 0%, var(--bg) 100%);
            padding: 22px 30px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 4px solid var(--red);
            border-right: 4px solid var(--red);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header-inner::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(232,0,10,0.08) 0%, transparent 70%);
        }

        .logo-block { position: relative; }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(2rem, 6vw, 4.2rem);
            font-weight: 900; font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 0.9;
            color: var(--text);
            text-shadow:
                4px 4px 0 var(--red),
                8px 8px 0 rgba(232,0,10,0.3),
                0 0 40px rgba(232,0,10,0.4);
        }

        .header-tag {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .live-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(232,0,10,0.12);
            border: 1px solid var(--border-red);
            padding: 8px 18px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem; font-weight: 700; font-style: italic;
            letter-spacing: 3px; color: var(--red-hot);
        }

        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--red-hot);
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink { 0%,100% { opacity: 1; box-shadow: 0 0 6px var(--red-hot); } 50% { opacity: 0.2; box-shadow: none; } }

        /* ===================== TIMER ===================== */
        .timer-section {
            background: var(--panel);
            border-left: 4px solid var(--red);
            border-right: 4px solid var(--red);
            border-bottom: 1px solid var(--border);
            padding: 28px 30px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 20px; flex-wrap: wrap;
        }

        .timer-left { display: flex; flex-direction: column; gap: 6px; }

        .race-label {
            font-size: 0.65rem; letter-spacing: 4px;
            color: var(--text-dim); text-transform: uppercase;
        }

        #raceName {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem; font-weight: 900; font-style: italic;
            text-transform: uppercase; color: var(--text);
            letter-spacing: 1px;
        }

        #timer {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(2.2rem, 7vw, 4.5rem);
            font-weight: 900;
            color: var(--text);
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        #timer span { color: var(--red); font-size: 0.5em; }

        .rules-btn {
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
            padding: 12px 32px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 900; font-style: italic;
            text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer;
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
            transition: all 0.2s;
        }
        .rules-btn:hover {
            background: var(--red);
            color: white;
            box-shadow: 0 0 20px var(--red-glow), inset 0 0 20px rgba(255,255,255,0.05);
        }

        /* ===================== MAIN CONTENT ===================== */
        .main-wrap {
            max-width: 1100px;
            margin: 40px auto 0;
        }

        /* ===================== STANDINGS GRID ===================== */
        .standings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
        }

        @media (max-width: 600px) {
            .standings-grid { grid-template-columns: 1fr; }
        }

        /* ===================== SECTION LABEL ===================== */
        .section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 5px; text-transform: uppercase;
            color: var(--text-dim);
            padding: 0 0 12px;
            display: flex; align-items: center; gap: 12px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
        }

        /* ===================== CARD ===================== */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: rgba(232,0,10,0.3); }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red) 70%, transparent 100%);
            opacity: 0; transition: opacity 0.3s;
        }
        .card:hover::before { opacity: 1; }

        .card-header {
            padding: 13px 18px;
            background: var(--panel2);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }

        .card-header-bar {
            width: 3px; height: 18px;
            background: var(--red);
            box-shadow: 0 0 8px var(--red-glow);
            flex-shrink: 0;
        }

        .card-header-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 900; font-style: italic;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--text);
        }

        /* ===================== TABLES ===================== */
        table { width: 100%; border-collapse: collapse; }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.15s;
            position: relative;
        }
        tbody tr:hover { background: rgba(255,255,255,0.025); }
        tbody tr:last-child { border-bottom: none; }

        td {
            padding: 11px 18px;
            font-size: 0.82rem;
            vertical-align: middle;
        }

        /* Position number */
        .pos {
            width: 32px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem; font-weight: 900;
            color: var(--text-dim);
            padding-left: 18px;
            text-align: left;
        }

        /* Medal positions */
        tbody tr:nth-child(1) .pos { color: var(--gold); }
        tbody tr:nth-child(2) .pos { color: #c0c0c0; }
        tbody tr:nth-child(3) .pos { color: #cd7f32; }

        /* Driver/team name */
        .name-cell {
            font-size: 0.85rem;
            color: var(--text);
        }

        /* Points */
        .pts {
            text-align: right;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem; font-weight: 900;
            color: var(--red-hot);
            padding-right: 18px;
            white-space: nowrap;
        }
        .pts::after {
            content: ' PTS';
            font-size: 0.5em;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Time cells */
        .time {
            text-align: right;
            font-size: 0.9rem; font-weight: 700;
            color: var(--green);
            padding-right: 18px;
            letter-spacing: 1px;
        }

        /* ===================== LAST RACE SECTION ===================== */
        .last-race-block {
            margin-top: 40px;
        }

        .last-race-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 900; font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text);
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 16px;
        }
        .last-race-title::before {
            content: '';
            width: 6px; height: 100%;
            min-height: 28px;
            background: var(--red);
            box-shadow: 0 0 12px var(--red-glow);
            flex-shrink: 0;
        }

        /* TRACK IMAGE — full width of standings grid */
        .track-card {
            background: var(--panel);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 3px;
            position: relative;
        }

        .track-card::before {
            content: 'CIRCUIT MAP';
            position: absolute; top: 14px; right: 18px;
            font-size: 0.6rem; letter-spacing: 4px;
            color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
        }

        .track-image {
            width: 100%;
            height: 320px;
            object-fit: contain;
            padding: 20px 30px;
            display: block;
            filter: drop-shadow(0 0 16px rgba(255,255,255,0.08));
        }

        /* ===================== ADMIN PANEL ===================== */
        #adminPanel {
            background: #0e0e14;
            border: 1px solid rgba(232,0,10,0.3);
            border-left: 3px solid var(--red);
            padding: 18px 22px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(232,0,10,0.06);
        }

        #adminPanel h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 900; font-style: italic;
            color: var(--red); letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 14px;
        }

        .admin-input {
            background: #1a1a22; border: 1px solid #333; color: white;
            padding: 9px 12px; margin: 3px;
            font-family: 'Share Tech Mono'; width: 210px;
            font-size: 0.78rem; outline: none;
            border-radius: 2px;
            transition: border-color 0.2s;
        }
        .admin-input:focus { border-color: var(--red); }

        .admin-btn {
            background: #1e1e28; color: white;
            border: 1px solid #333; padding: 9px 16px;
            cursor: pointer; font-weight: 700; margin: 3px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem; font-style: italic;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.2s; border-radius: 2px;
        }
        .admin-btn:hover { background: var(--red); border-color: var(--red); }
        .admin-divider { border: 0; border-top: 1px solid #1e1e28; margin: 14px 0; }

        /* ===================== LOCK BTN ===================== */
        #lockBtn {
            position: fixed; top: 14px; right: 14px; z-index: 9999;
            background: rgba(10,10,14,0.9);
            border: 1px solid var(--border);
            color: white; cursor: pointer;
            padding: 8px 10px; font-size: 1rem;
            backdrop-filter: blur(4px);
            transition: border-color 0.2s;
        }
        #lockBtn:hover { border-color: var(--red); }

        /* ===================== MODAL ===================== */
        #rulesModal {
            display: none; position: fixed; z-index: 10000;
            inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--panel);
            margin: 6% auto; padding: 32px;
            border-top: 3px solid var(--red);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            width: 88%; max-width: 620px;
            font-size: 0.85rem;
        }

        .modal-content h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem; font-weight: 900; font-style: italic;
            color: var(--red); text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 18px;
        }

        /* ===================== CORNER DECO ===================== */
        .corner-deco {
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--red);
            border-style: solid;
            opacity: 0.5;
        }
        .corner-deco.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .corner-deco.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .corner-deco.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .corner-deco.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    </style>
</head>
<body>

<div id="rulesModal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; font-size:1.6rem; line-height:1; color:var(--text-dim)" onclick="closeRules()">&times;</span>
        <h2>REGULAMIN</h2>
        <div id="rulesEditor" style="min-height:220px; outline:none; line-height:1.7; color:var(--text-dim)" onblur="window.updateRules(this.innerText)">Wpisz regulamin...</div>
    </div>
</div>

<button id="lockBtn" onclick="toggleLogin()">🔒</button>

<header>
    <div class="header-stripe"></div>
    <div class="header-inner">
        <div class="logo-block">
            <span class="header-tag">&#9660; SEZON 2026 &#9660;</span>
            <h1>Formula de Benczes</h1>
        </div>
</header>

<div class="timer-section">
    <div class="timer-left">
        <span class="race-label">Nastepny wyścig</span>
        <div id="raceName">Czekanie na dane...</div>
    </div>
    <div id="timer">00<span>D</span> 00<span>H</span> 00<span>M</span> 00<span>S</span></div>
    <button class="rules-btn" onclick="openRules()">Regulamin</button>
</div>

<div class="page-wrap">
<div class="main-wrap">

    <div id="adminPanel" style="display:none">
        <h3>⚙ Admin Dashboard</h3>
        <input type="datetime-local" id="newDate" class="admin-input">
        <input type="text" id="newName" class="admin-input" placeholder="Nazwa wyścigu">
        <button class="admin-btn" onclick="updateRaceInfo()">Zapisz</button>
        <hr class="admin-divider">
        <button class="admin-btn" onclick="window.addDriver()">+ Kierowca</button>
        <button class="admin-btn" onclick="window.addTeam()">+ Zespół</button>
        <button class="admin-btn" style="background:#3a0000; border-color:#700000" onclick="window.resetDatabase()">Reset DB</button>
    </div>

    <!-- == STANDINGS == -->
    <div class="section-label">Standings</div>
    <div class="standings-grid">
        <div class="card" style="position:relative">
            <div class="corner-deco tl"></div><div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div><div class="corner-deco br"></div>
            <div class="card-header">
                <div class="card-header-bar"></div>
                <span class="card-header-text">Drivers Championship</span>
            </div>
            <table><tbody id="driversBody"></tbody></table>
        </div>
        <div class="card" style="position:relative">
            <div class="corner-deco tl"></div><div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div><div class="corner-deco br"></div>
            <div class="card-header">
                <div class="card-header-bar"></div>
                <span class="card-header-text">Constructors Championship</span>
            </div>
            <table><tbody id="teamsBody"></tbody></table>
        </div>
    </div>

    <!-- == LAST RACE == -->
    <div class="last-race-block">
        <div class="last-race-title">Last Race Report</div>

        <div class="standings-grid">
            <div class="card" style="position:relative">
                <div class="corner-deco tl"></div><div class="corner-deco tr"></div>
                <div class="corner-deco bl"></div><div class="corner-deco br"></div>
                <div class="card-header">
                    <div class="card-header-bar" style="background:var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5)"></div>
                    <span class="card-header-text">Best Lap Times</span>
                </div>
                <table><tbody id="bestBody"></tbody></table>
            </div>
            <div class="card" style="position:relative">
                <div class="corner-deco tl"></div><div class="corner-deco tr"></div>
                <div class="corner-deco bl"></div><div class="corner-deco br"></div>
                <div class="card-header">
                    <div class="card-header-bar" style="background:var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5)"></div>
                    <span class="card-header-text">Average Lap Times</span>
                </div>
                <table><tbody id="avgBody"></tbody></table>
            </div>
        </div>

        <!-- TRACK IMAGE — same width as the 2-col grid above -->
        <div class="track-card">
    <img src="tor.png" class="track-image" alt="Circuit Map" style="transform: rotate(180deg); display: block; max-width: 100%;">
</div>
    </div>

</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC99ICN7B4RJ1elKXisVL21Z9SrUOINCew",
        authDomain: "formuladebenczes.firebaseapp.com",
        databaseURL: "https://formuladebenczes-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "formuladebenczes",
        storageBucket: "formuladebenczes.firebasestorage.app",
        messagingSenderId: "30090958950",
        appId: "1:30090958950:web:94184dbbf0fb24d85af5a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const dataRef = ref(db, 'fdb_live_data');

    let localDB = { drivers: [], teams: [], times: [], raceDate: "", raceTitle: "", rulesText: "Wpisz regulamin..." };
    window.isLoggedIn = false;

    window.openRules = () => { document.getElementById('rulesModal').style.display = 'block'; };
    window.closeRules = () => { document.getElementById('rulesModal').style.display = 'none'; };

    onAuthStateChanged(auth, (user) => {
        window.isLoggedIn = !!user;
        document.getElementById('lockBtn').innerHTML = user ? '🔓' : '🔒';
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        document.getElementById('rulesEditor').contentEditable = !!user;
        render();
    });

    window.toggleLogin = async () => {
        if (!window.isLoggedIn) {
            const email = prompt("E-mail:"); const pass = prompt("Hasło:");
            if(email && pass) try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Błąd!"); }
        } else { if(confirm("Wylogować?")) signOut(auth); }
    };

    onValue(dataRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { localDB = data; render(); }
    });

    window.updateRules = (val) => {
        if (!window.isLoggedIn) return;
        localDB.rulesText = val; save();
    };

    window.updateRaceInfo = () => {
        const d = document.getElementById('newDate').value;
        const n = document.getElementById('newName').value;
        if(d) localDB.raceDate = d;
        if(n) localDB.raceTitle = n;
        save();
    };

    window.addDriver = () => {
        const name = prompt("Imię i nazwisko:");
        if (name) {
            if(!localDB.drivers) localDB.drivers = [];
            localDB.drivers.push({ name, pts: 0 });
            if(!localDB.times) localDB.times = [];
            localDB.times.push({ name, best: "0:00.000", avg: "0:00.000" });
            save();
        }
    };

    window.addTeam = () => {
        const name = prompt("Nazwa zespołu:");
        if (name) { 
            if(!localDB.teams) localDB.teams = [];
            localDB.teams.push({ name, pts: 0 }); save(); 
        }
    };

    window.updateData = (cat, idx, field, val) => {
        if (!window.isLoggedIn) return;
        localDB[cat][idx][field] = field === 'pts' ? parseInt(val) || 0 : val;
        save();
    };

    const save = () => set(dataRef, localDB);
    window.removeEntry = (cat, i) => { if(confirm("Usunąć wpis?")) { localDB[cat].splice(i, 1); save(); } };
    const timeToMs = (t) => { if (!t || t === "0:00.000") return 9999999; return parseInt(t.replace(/[:.]/g, '')) || 9999999; };

    function render() {
        const edit = window.isLoggedIn;
        const del = (cat, i) => edit ? `<span style="color:#e8000a; cursor:pointer; margin-right:6px; font-size:1.1em; opacity:0.6" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0.6" onclick="window.removeEntry('${cat}',${i})">×</span>` : '';
        const row = (cat, i, field, val, cl="") => `<td class="${cl}" contenteditable="${edit}" onblur="window.updateData('${cat}',${i},'${field}',this.innerText)">${val}</td>`;

        document.getElementById('raceName').innerText = localDB.raceTitle || "GP WYŚCIG";
        document.getElementById('rulesEditor').innerText = localDB.rulesText || "Wpisz regulamin...";

        if(localDB.drivers) {
            localDB.drivers.sort((a,b) => b.pts - a.pts);
            document.getElementById('driversBody').innerHTML = localDB.drivers.map((d, i) =>
                `<tr><td class="pos">${del('drivers',i)}${i+1}</td>${row('drivers',i,'name',d.name,'name-cell')}${row('drivers',i,'pts',d.pts,'pts')}</tr>`
            ).join('');
        }

        if(localDB.teams) {
            localDB.teams.sort((a,b) => b.pts - a.pts);
            document.getElementById('teamsBody').innerHTML = localDB.teams.map((t, i) =>
                `<tr><td class="pos">${del('teams',i)}${i+1}</td>${row('teams',i,'name',t.name,'name-cell')}${row('teams',i,'pts',t.pts,'pts')}</tr>`
            ).join('');
        }

        if(localDB.times) {
            const sortedBest = [...localDB.times].sort((a,b) => timeToMs(a.best) - timeToMs(b.best));
            document.getElementById('bestBody').innerHTML = sortedBest.map((t) => {
                const idx = localDB.times.findIndex(x => x.name === t.name);
                return `<tr><td class="name-cell">${t.name}</td>${row('times',idx,'best',t.best,'time')}</tr>`;
            }).join('');

            const sortedAvg = [...localDB.times].sort((a,b) => timeToMs(a.avg) - timeToMs(b.avg));
            document.getElementById('avgBody').innerHTML = sortedAvg.map((t) => {
                const idx = localDB.times.findIndex(x => x.name === t.name);
                return `<tr><td class="name-cell">${t.name}</td>${row('times',idx,'avg',t.avg,'time')}</tr>`;
            }).join('');
        }
    }

    setInterval(() => {
        const target = localDB.raceDate || "2026-04-18T19:00";
        const diff = new Date(target).getTime() - new Date().getTime();
        const d = Math.max(0, Math.floor(diff / 86400000));
        const h = Math.max(0, Math.floor((diff % 86400000) / 3600000));
        const m = Math.max(0, Math.floor((diff % 3600000) / 60000));
        const s = Math.max(0, Math.floor((diff % 60000) / 1000));
        const pad = (n) => String(n).padStart(2, '0');
        document.getElementById("timer").innerHTML =
            `${d}<span>D</span> ${pad(h)}<span>H</span> ${pad(m)}<span>M</span> ${pad(s)}<span>S</span>`;
    }, 1000);
</script>
</body>
</html>
